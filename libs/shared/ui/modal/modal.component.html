@if (open) {
  <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <!-- Backdrop: focusable + keyboard accessible -->
    <div
      class="absolute inset-0 bg-black/60"
      role="button"
      tabindex="0"
      aria-label="Close dialog"
      (click)="backdropClick()"
      (keydown)="backdropKeydown($event)"
    ></div>

    <!-- Panel -->
    <div
      #dialogPanel
      class="relative"
      [class]="panelClasses"
      role="dialog"
      aria-modal="true"
      tabindex="-1"
      [attr.aria-labelledby]="title ? titleId : null"
      (click)="stop($event)"
    >
      <div class="flex items-start justify-between gap-4 p-5 border-b border-slate-800">
        <div class="min-w-0">
          @if (title) {
            <h3 class="text-lg font-semibold" [id]="titleId">{{ title }}</h3>
          }
        </div>

        <button
          type="button"
          class="h-9 w-9 rounded-xl hover:bg-slate-800/60 transition"
          aria-label="Close dialog"
          (click)="close()"
        >
          ✕
        </button>
      </div>

      <div class="p-5">
        <ng-content></ng-content>
      </div>

      <div class="p-5 pt-0">
        <div class="flex justify-end gap-2">
          <ng-content select="[modal-actions]"></ng-content>
        </div>
      </div>
    </div>
  </div>
}

<label class="ff-field">
  @if (label) {
    <span class="ff-field-label" [id]="controlId + '-label'">
      {{ label }}
    </span>
  }

  <select
    [id]="controlId"
    [class]="selectClasses"
    [attr.aria-labelledby]="label ? controlId + '-label' : null"
    [attr.aria-invalid]="error ? 'true' : 'false'"
    [attr.aria-describedby]="describedBy"
    [disabled]="disabled()"
    [value]="value() ?? ''"
    (change)="handleChange($event)"
    (blur)="blur()"
  >
    <option value="" disabled selected hidden>
      {{ placeholder }}
    </option>

    @for (opt of options; track opt.value) {
      <option
        [value]="opt.value"
        [disabled]="opt.disabled"
      >
        {{ opt.label }}
      </option>
    }
  </select>

  @if (error) {
    <p class="ff-field-error" [id]="errorId">{{ error }}</p>
  } @else if (hint) {
    <p class="ff-field-hint" [id]="hintId">{{ hint }}</p>
  }
</label>

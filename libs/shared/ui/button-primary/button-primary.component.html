<button
  [attr.type]="type"
  [disabled]="isDisabled"
  [class]="classes"
  [attr.aria-busy]="loading"
  (click)="onButtonClicked()"
>
  @if (loading) {
    <span class="ff-btn-spinner" aria-hidden="true"></span>
    <span>Loading...</span>
  } @else {
    @if (icon) {
      <span class="material-symbols-outlined text-base" aria-hidden="true">{{ icon }}</span>
    }

    @if (label) {
      <span>{{ label }}</span>
    } @else {
      <ng-content></ng-content>
    }
  }
</button>

<button
  [attr.type]="type"
  [disabled]="isDisabled"
  [class]="classes"
  [attr.aria-busy]="loading"
  (click)="onButtonClicked()"
>
  @if (!loading) {
    @if (icon) {
      <span class="material-symbols-outlined text-base" aria-hidden="true">{{ icon }}</span>
    }

    @if (label) {
      <span>{{ label }}</span>
    } @else {
      <ng-content></ng-content>
    }
  } @else {
    <span class="ff-btn-loading">
      <ng-content select="[loading]"></ng-content>
    </span>
  }
</button>

<div class="ff-field">
  @if (label) {
    <label class="ff-field-label" [attr.for]="controlId">{{ label }}</label>
  }

  <div class="ff-input-wrapper">
    @if (icon) {
      <span class="ff-input-icon">
        <svg
          [lucideIcon]="icon"
          class="h-4 w-4"
          [attr.stroke-width]="1.9"
        ></svg>
      </span>
    }

    <input
      [id]="controlId"
      [class]="inputClasses"
      [attr.type]="type"
      [attr.placeholder]="placeholder"
      [attr.aria-invalid]="error ? 'true' : 'false'"
      [attr.aria-describedby]="describedBy"
      [disabled]="disabled()"
      [value]="value()"
      (input)="handleInput($event)"
      (blur)="blur()"
    />
  </div>

  @if (error) {
    <p class="ff-field-error" [id]="errorId">{{ error }}</p>
  } @else if (hint) {
    <p class="ff-field-hint" [id]="hintId">{{ hint }}</p>
  }
</div>

<label class="ff-field">
  @if (label) {
    <span class="ff-field-label">{{ label }}</span>
  }

  <input
    [class]="inputClasses"
    [attr.type]="type"
    [attr.placeholder]="placeholder"
    [disabled]="disabled()"
    [value]="value()"
    (input)="handleInput($event)"
    (blur)="blur()"
  />

  @if (error) {
    <p class="ff-field-error">{{ error }}</p>
  }
</label>

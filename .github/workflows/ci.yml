name: CI

on:
  workflow_dispatch:
  push:
    branches: ["main", "dev"]
  pull_request:

env:
  PYTHON_VERSION: "3.12"
  DJANGO_SETTINGS_MODULE: "core.settings"
  # SECRET_KEY peut rester un secret, mais il doit exister (sinon mets un fallback)
  SECRET_KEY: ${{ secrets.SECRET_KEY }}

jobs:
  backend-lint:
    name: Backend • Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format (check)
        run: ruff format . --check


  backend-tests:
    name: Backend • Tests (Django)
    runs-on: ubuntu-latest
    needs: [backend-lint]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/backend

    env:
      DJANGO_SETTINGS_MODULE: "core.settings"
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: testdb
      DB_USER: testuser
      DB_PASSWORD: testpass
      DATABASE_URL: postgres://testuser:testpass@127.0.0.1:5432/testdb

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: apps/backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django checks + migrations
        run: |
          python manage.py check
          python manage.py migrate --noinput

      - name: Run pytest
        run: |
          pytest -ra -q


  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Ensure npm cache dir exists
        run: mkdir -p ~/.npm
        working-directory: .   # important: pas apps/frontend

      - name: Debug lockfile presence
        run: ls -la ./package-lock.json
        working-directory: .   # important: pas apps/frontend

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./package-lock.json

      - name: Install deps
        run: npm ci

      - name: Format check (Prettier)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Unit tests (CI)
        run: npm run test:ci

      - name: Build (production)
        run: npm run build

  candidate-tests:
    name: Candidate • Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/candidate

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/candidate/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Unit tests (CI)
        run: npm run test:ci

      - name: Build (production)
        run: npm run build

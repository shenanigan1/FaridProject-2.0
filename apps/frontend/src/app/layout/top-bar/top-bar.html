<header
  class="relative flex h-[72px] items-center justify-between border-b border-[#111d2d] bg-[#070d18] px-4"
>
  <div class="flex items-center gap-3">
    <div
      class="flex h-9 w-9 items-center justify-center rounded-full bg-[#1480ec] shadow-[0_0_20px_rgba(20,128,236,0.5)]"
      aria-hidden="true"
    >
      <svg
        viewBox="0 0 24 24"
        class="h-4 w-4 text-white"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M7 17 17 7M8 7h9v9" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="leading-[1.05]">
      <p class="text-[14px] font-black uppercase italic tracking-[0.05em] text-white">MIDNIGHT</p>
      <p class="text-[10px] font-semibold uppercase tracking-[0.28em] text-[#61a3df]">KINETIC</p>
    </div>
  </div>

  <button
    type="button"
    class="flex h-9 w-9 items-center justify-center rounded-lg border border-[#1b2a3b] bg-[#0b1422] text-slate-200 transition hover:border-[#2f4763]"
    aria-label="Open navigation menu"
    (click)="toggleMenu()"
  >
    <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 6h18M3 12h18M3 18h18" stroke-linecap="round" />
    </svg>
  </button>

  @if (menuOpen()) {
    <div
      class="absolute right-4 top-14 z-50 w-56 rounded-xl border border-slate-700 bg-slate-900 p-2 shadow-2xl"
    >
      @if (user) {
        <div
          class="mb-2 flex items-center gap-2 rounded-lg border border-slate-800 bg-slate-950/50 px-2 py-1.5"
        >
          <div
            class="flex h-7 w-7 items-center justify-center rounded-full border border-slate-700 bg-slate-800 text-xs"
          >
            {{ userInitials }}
          </div>
          <span class="truncate text-xs text-slate-300">{{ user.fullName }}</span>
        </div>
      }
      <button
        type="button"
        class="w-full rounded-lg px-3 py-2 text-left text-sm text-slate-200 transition hover:bg-slate-800"
        (click)="requestEditProfile()"
      >
        Edit profile
      </button>
      <button
        type="button"
        class="mt-1 w-full rounded-lg px-3 py-2 text-left text-sm text-red-300 transition hover:bg-red-500/10"
        (click)="requestLogout()"
      >
        Logout
      </button>
    </div>
  }
</header>

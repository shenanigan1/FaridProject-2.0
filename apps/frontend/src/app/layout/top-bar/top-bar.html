<header
  class="flex h-[72px] items-center justify-between px-6
         bg-gradient-to-r from-slate-900 via-slate-900 to-slate-800
         border-b border-slate-800"
>
  <!-- Left -->
  <div class="relative flex items-center gap-3">
    <div
      class="h-10 w-10 rounded-xl bg-blue-600/90 flex items-center justify-center
             shadow-md shadow-blue-600/20"
      aria-hidden="true"
    >
      <span class="text-white text-lg">💼</span>
    </div>

    <div class="leading-tight">
      <div class="text-white font-semibold text-sm sm:text-base">
        {{ title }}
      </div>

      @if (subtitle) {
        <div class="text-slate-400 text-xs">
          {{ subtitle }}
        </div>
      }
    </div>
  </div>

  <!-- Right -->
  <div class="flex items-center gap-3">
    <!-- Notifications -->
    <button
      type="button"
      class="relative h-10 w-10 rounded-xl flex items-center justify-center
             bg-slate-800/70 border border-slate-700
             hover:bg-slate-800 hover:border-slate-600
             transition"
      aria-label="Notifications"
    >
      <span class="text-slate-200 text-lg">🔔</span>

      @if (notificationCount > 0) {
        <span
          class="absolute -top-1 -right-1 min-w-5 h-5 px-1
                 rounded-full bg-red-500 text-white text-[11px]
                 flex items-center justify-center border border-slate-900"
        >
          {{ notificationCount }}
        </span>
      }
    </button>

    <!-- Avatar -->
    @if (user) {
      <button
        type="button"
        (click)="toggleMenu()"
        class="h-10 w-10 rounded-full overflow-hidden
               bg-slate-700 border border-slate-600
               flex items-center justify-center
               shadow-sm"
        aria-label="Open user menu"
      >
        @if (user.avatarUrl) {
          <img
            [src]="user.avatarUrl"
            alt="avatar"
            class="h-full w-full object-cover"
          />
        } @else {
          <span class="text-white font-semibold">
            {{ user.fullName }}
          </span>
        }
      </button>

      @if (menuOpen()) {
        <div class="absolute right-0 top-12 z-50 w-56 rounded-xl border border-slate-700 bg-slate-900 p-2 shadow-2xl">
          <button
            type="button"
            class="w-full rounded-lg px-3 py-2 text-left text-sm text-slate-200 transition hover:bg-slate-800"
            (click)="requestEditProfile()"
          >
            Edit profile
          </button>
          <button
            type="button"
            class="mt-1 w-full rounded-lg px-3 py-2 text-left text-sm text-red-300 transition hover:bg-red-500/10"
            (click)="requestLogout()"
          >
            Logout
          </button>
        </div>
      }
    }
  </div>
</header>

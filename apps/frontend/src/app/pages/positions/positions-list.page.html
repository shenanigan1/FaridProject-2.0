<div class="min-h-[calc(100vh-144px)] bg-slate-950 text-slate-100 p-4">
  <!-- Search -->
  <div class="mb-3">
    <input
      [formControl]="searchCtrl"
      placeholder="Search job titles..."
      class="h-11 w-full rounded-2xl bg-slate-900 border border-slate-800 px-4 text-sm
             placeholder:text-slate-500
             focus:outline-none focus:ring-2 focus:ring-blue-500/30"
    />
  </div>

  <!-- Filters -->
  <div class="flex items-center gap-2 mb-4">
    <select
      [formControl]="locationCtrl"
      class="h-9 rounded-full bg-slate-900 border border-slate-800 px-4 text-xs
             text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30"
    >
      <option *ngFor="let opt of locationOptions" [value]="opt.value">{{ opt.label }}</option>
    </select>

    <select
      [formControl]="truckTypeCtrl"
      class="h-9 rounded-full bg-slate-900 border border-slate-800 px-4 text-xs
             text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30"
    >
      <option *ngFor="let opt of truckTypeOptions" [value]="opt.value">{{ opt.label }}</option>
    </select>

    <select
      [formControl]="priorityCtrl"
      class="h-9 rounded-full bg-slate-900 border border-slate-800 px-4 text-xs
             text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/30"
    >
      <option *ngFor="let opt of priorityOptions" [value]="opt.value">{{ opt.label }}</option>
    </select>
  </div>

  <!-- Loading/Error -->
  <div *ngIf="isLoading" class="text-sm text-slate-400">Loading positions...</div>

  <div
    *ngIf="!isLoading && error"
    class="rounded-xl border border-red-500/25 bg-red-500/10 p-3 text-sm text-red-200"
  >
    {{ error }}
  </div>

  <!-- Cards -->
  <div *ngIf="!isLoading && !error" class="space-y-3">
    <ng-container *ngIf="filteredPositions$ | async as positions">
      <div
        *ngFor="let p of positions"
        class="rounded-2xl bg-slate-900/60 border border-slate-800 p-4
               shadow-[0_10px_30px_-18px_rgba(0,0,0,0.8)]"
      >
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-sm font-semibold">{{ p.title }}</div>

            <div class="mt-2 space-y-1 text-xs text-slate-400">
              <div class="flex items-center gap-2">
                <span class="opacity-80">📍</span>
                <span>{{ p.location || '—' }}</span>
                <span class="text-slate-600">•</span>
                <span>{{ p.contract_type }}</span>
              </div>

              <div class="flex items-center gap-2">
                <span class="opacity-80">🧰</span>
                <span>{{ p.department }}</span>
              </div>
            </div>
          </div>

          <ng-container *ngIf="getBadge(p) as b">
            <span
              class="px-2 py-1 rounded-full text-[10px] font-semibold tracking-wide"
              [class]="badgeClass(b.tone)"
            >
              {{ b.label }}
            </span>
          </ng-container>
        </div>

        <div class="mt-4 flex items-end justify-between">
          <div class="text-[11px] text-slate-400">
            <div>Applicants: —</div>
            <div class="text-slate-500">Closing: —</div>
          </div>

          <a
            [routerLink]="['/positions', p.id]"
            class="inline-flex items-center justify-center h-9 px-4 rounded-xl
                   bg-blue-600 text-white text-xs font-semibold
                   hover:bg-blue-500 transition"
          >
            Manage
          </a>
        </div>
      </div>

      <div *ngIf="positions.length === 0" class="text-sm text-slate-400">
        No positions found.
      </div>
    </ng-container>
  </div>

  <!-- Floating Add Button -->
  <a
    routerLink="/positions/new"
    class="fixed bottom-6 right-6 h-12 w-12 rounded-full bg-blue-600 text-white
           flex items-center justify-center text-2xl
           shadow-[0_18px_35px_-18px_rgba(37,99,235,0.9)]
           hover:bg-blue-500 transition"
    aria-label="Add position"
  >
    +
  </a>
</div>

<div class="min-h-screen w-full bg-slate-950 text-slate-100 flex items-center justify-center p-4">
  <div class="w-full max-w-sm rounded-2xl bg-slate-900/60 border border-slate-700/50 shadow-xl p-6">
    <!-- Header -->
    <div class="flex flex-col items-center gap-3 mb-6">
      <div class="h-14 w-14 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700">
        <!-- simple icon (truck) -->
        <svg viewBox="0 0 24 24" class="h-7 w-7 text-sky-400" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 17V6a1 1 0 0 1 1-1h11v12H3z"></path>
          <path d="M15 8h4l2 3v6h-6V8z"></path>
          <path d="M7 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"></path>
          <path d="M17 19a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"></path>
        </svg>
      </div>

      <div class="text-center">
        <div class="text-xl font-semibold tracking-tight">FleetConnect HR</div>
        <div class="text-xs text-slate-400">Logistics &amp; Recruitment Portal</div>
      </div>
    </div>

    <!-- Profile selector -->
    <div class="text-[11px] text-slate-400 text-center mb-2 tracking-wider">SELECT YOUR PROFILE</div>

    <div class="grid grid-cols-3 gap-2 mb-5">
      <button
        type="button"
        class="rounded-lg border px-2 py-3 text-xs font-semibold transition
               border-slate-700 bg-slate-800/60 text-slate-200 hover:bg-slate-800"
        [class.!border-sky-500]="selectedProfile() === 'driver'"
        [class.!text-sky-300]="selectedProfile() === 'driver'"
        [class.!bg-slate-800]="selectedProfile() === 'driver'"
        (click)="selectProfile('driver')"
      >
        DRIVER
      </button>

      <button
        type="button"
        class="rounded-lg border px-2 py-3 text-xs font-semibold transition
               border-slate-700 bg-slate-800/60 text-slate-200 hover:bg-slate-800"
        [class.!border-sky-500]="selectedProfile() === 'manager'"
        [class.!text-sky-300]="selectedProfile() === 'manager'"
        [class.!bg-slate-800]="selectedProfile() === 'manager'"
        (click)="selectProfile('manager')"
      >
        MANAGER
      </button>

      <button
        type="button"
        class="rounded-lg border px-2 py-3 text-xs font-semibold transition
               border-slate-700 bg-slate-800/60 text-slate-200 hover:bg-slate-800"
        [class.!border-sky-500]="selectedProfile() === 'hr'"
        [class.!text-sky-300]="selectedProfile() === 'hr'"
        [class.!bg-slate-800]="selectedProfile() === 'hr'"
        (click)="selectProfile('hr')"
      >
        HR/ADMIN
      </button>
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage()" class="mb-4 rounded-lg border border-red-500/40 bg-red-500/10 px-3 py-2 text-sm text-red-200">
      {{ errorMessage() }}
    </div>

    <form (ngSubmit)="submit()" [formGroup]="form" class="space-y-4">
      <!-- Identifier -->
      <div>
        <label class="text-xs text-slate-300 block mb-2">{{ identifierLabel() }}</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
            <!-- user icon -->
            <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21a8 8 0 1 0-16 0"></path>
              <path d="M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path>
            </svg>
          </span>
          <input
            formControlName="identifier"
            class="w-full rounded-xl border border-slate-700 bg-slate-900/60 px-10 py-3 text-sm
                   outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500/60"
            placeholder="Enter your credentials"
            autocomplete="username"
          />
        </div>
        <p *ngIf="form.controls.identifier.touched && form.controls.identifier.invalid" class="mt-1 text-xs text-red-300">
          This field is required.
        </p>
      </div>

      <!-- Password -->
      <div>
        <label class="text-xs text-slate-300 block mb-2">Password</label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">
            <!-- lock icon -->
            <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M7 11V8a5 5 0 0 1 10 0v3"></path>
              <path d="M6 11h12v10H6z"></path>
            </svg>
          </span>

          <input
            formControlName="password"
            class="w-full rounded-xl border border-slate-700 bg-slate-900/60 px-10 py-3 text-sm
                   outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500/60"
            [type]="passwordVisible() ? 'text' : 'password'"
            placeholder="••••••••"
            autocomplete="current-password"
          />

          <button
            type="button"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200"
            (click)="togglePassword()"
            aria-label="Toggle password visibility"
          >
            <!-- eye icon -->
            <svg *ngIf="!passwordVisible()" viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12z"></path>
              <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"></path>
            </svg>
            <svg *ngIf="passwordVisible()" viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6 0-10-7-10-7a21.8 21.8 0 0 1 5.06-5.94"></path>
              <path d="M1 1l22 22"></path>
              <path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"></path>
              <path d="M14.1 14.1L9.9 9.9"></path>
              <path d="M10.73 5.08A10.87 10.87 0 0 1 12 5c6 0 10 7 10 7a21.8 21.8 0 0 1-3.17 4.35"></path>
            </svg>
          </button>
        </div>

        <p *ngIf="form.controls.password.touched && form.controls.password.invalid" class="mt-1 text-xs text-red-300">
          This field is required.
        </p>
      </div>

      <!-- Remember / Forgot -->
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2 text-slate-300">
          <input
            type="checkbox"
            formControlName="rememberMe"
            class="h-4 w-4 rounded border-slate-600 bg-slate-900 text-sky-500 focus:ring-sky-500/30"
          />
          <span class="text-xs">Remember me</span>
        </label>

        <a class="text-xs text-sky-400 hover:text-sky-300" routerLink="/auth/forgot-password">
          Forgot Password?
        </a>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="w-full rounded-xl bg-sky-600 hover:bg-sky-500 transition text-white font-semibold py-3
               disabled:opacity-60 disabled:cursor-not-allowed"
        [disabled]="loading()"
      >
        <span *ngIf="!loading()">Sign In</span>
        <span *ngIf="loading()">Signing in...</span>
      </button>
    </form>

    <!-- Footer -->
    <div class="mt-6 text-center text-xs text-slate-400">
      Having trouble?
      <a class="text-sky-400 hover:text-sky-300" routerLink="/support">Contact Dispatch</a>
    </div>
  </div>
</div>

<label class="block">
  <span *ngIf="label" class="text-sm font-medium text-slate-300">{{ label }}</span>

  <textarea
    class="mt-1 w-full rounded-xl border border-slate-800 bg-slate-900 px-4 py-3 text-slate-100
           outline-none focus:ring-2 focus:ring-blue-500/40 focus:border-slate-700"
    [class.border-red-500/40]="!!error"
    [attr.placeholder]="placeholder"
    [attr.rows]="rows"
    [disabled]="disabled()"
    [value]="value()"
    (input)="handleInput($event)"
    (blur)="blur()"
  ></textarea>

  <p *ngIf="error" class="mt-1 text-xs text-red-300">{{ error }}</p>
  <p *ngIf="hint && !error" class="mt-1 text-xs text-slate-500">{{ hint }}</p>
</label>

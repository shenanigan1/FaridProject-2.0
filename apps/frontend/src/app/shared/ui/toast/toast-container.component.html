<div class="fixed right-4 top-4 z-[60] flex flex-col gap-2 pointer-events-none">
  @for (t of toast.toasts(); track t.id) {
    <div [class]="classes(t)">
      <div class="flex items-start justify-between gap-3">
        <div class="leading-5">
          {{ t.message }}
        </div>

        <button
          type="button"
          class="h-7 w-7 rounded-xl hover:bg-white/10 transition pointer-events-auto"
          aria-label="Close notification"
          (click)="toast.remove(t.id)"
        >
          ✕
        </button>
      </div>
    </div>
  }
</div>

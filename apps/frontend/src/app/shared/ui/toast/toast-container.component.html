<div class="fixed right-4 top-4 z-[60] flex flex-col gap-2 pointer-events-none">
  <div
    *ngFor="let t of toast.toasts(); trackBy: trackById"
    [class]="classes(t)"
  >
    <div class="flex items-start justify-between gap-3">
      <div class="leading-5">
        {{ t.message }}
      </div>

      <button
        type="button"
        class="h-7 w-7 rounded-xl hover:bg-white/10 transition"
        aria-label="Close notification"
        (click)="toast.remove(t.id)"
      >
        ✕
      </button>
    </div>
  </div>
</div>

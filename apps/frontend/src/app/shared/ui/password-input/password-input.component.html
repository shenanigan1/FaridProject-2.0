<label class="block">
  <span *ngIf="label" class="text-sm font-medium text-gray-700">{{ label }}</span>

  <div
    class="mt-1 flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-4 py-3
           focus-within:ring-2 focus-within:ring-gray-900/10 focus-within:border-gray-300"
    [class.border-red-300]="!!error"
  >
    <input
      class="w-full bg-transparent outline-none text-gray-900"
      [attr.type]="show() ? 'text' : 'password'"
      [attr.placeholder]="placeholder"
      [disabled]="disabled()"
      [value]="value()"
      (input)="handleInput($event)"
      (blur)="blur()"
    />

    <button
      type="button"
      class="text-sm text-gray-700 hover:text-gray-900"
      (click)="toggle()"
      [disabled]="disabled()"
    >
      {{ show() ? 'Hide' : 'Show' }}
    </button>
  </div>

  <p *ngIf="error" class="mt-1 text-xs text-red-600">{{ error }}</p>
</label>

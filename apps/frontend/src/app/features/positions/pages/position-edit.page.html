<app-form-page-shell title="Manage Position" subtitle="Edit job offer details">
  <div shell-actions>
    <a
      routerLink="/positions"
      class="h-9 px-4 rounded-xl border border-slate-800 bg-slate-900 hover:bg-slate-800 transition text-sm inline-flex items-center"
    >
      Back
    </a>
  </div>

  <ng-container *ngIf="state$ | async as state">
    <app-position-form
      *ngIf="state.status === 'ready'"
      [mode]="'edit'"
      [form]="form"
      [isSubmitting]="isSubmitting"
      [apiError]="apiError"
      [fieldErrors]="fieldErrors"
      (submitForm)="submit(state.positionId)"
      (cancel)="cancel()"
    />

    <div *ngIf="state.status === 'loading'"
         class="rounded-2xl bg-slate-900/60 border border-slate-800 p-5 text-sm text-slate-400">
      Loading...
    </div>

    <div *ngIf="state.status === 'error'"
         class="rounded-xl border border-red-500/25 bg-red-500/10 p-3 text-sm text-red-200">
      {{ state.message }}
    </div>
  </ng-container>
</app-form-page-shell>

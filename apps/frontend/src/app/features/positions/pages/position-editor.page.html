<app-form-page-shell [title]="shellTitle()" [subtitle]="shellSubtitle()">
  <div shell-actions>
    <app-ui-link-button
      [routerLink]="['/positions']"
      label="Back"
      variant="secondary"
      size="sm"
    />
  </div>

  @if (state(); as state) {

    <!-- READY -->
    @if (state.status === 'ready-create' || state.status === 'ready-edit') {
      <app-position-form
        [mode]="mode()"
        [form]="form"
        [isSubmitting]="isSubmitting()"
        [apiError]="apiError()"
        [fieldErrors]="fieldErrors()"
        (submitForm)="submit()"
        (cancel)="cancel()"
      />
    }

    <!-- LOADING (edit only) -->
    @if (state.status === 'loading') {
      <app-ui-card>
        <div class="text-sm text-slate-400">Loading...</div>
      </app-ui-card>
    }

    <!-- ERROR -->
    @if (state.status === 'error') {
      <div
        class="rounded-xl border border-red-500/25 bg-red-500/10 p-3 text-sm text-red-200"
      >
        {{ state.message }}
      </div>
    }

  }
</app-form-page-shell>

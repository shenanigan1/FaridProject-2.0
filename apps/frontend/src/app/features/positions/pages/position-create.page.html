<app-form-page-shell title="Add Position" subtitle="Create a new job offer">
  <div shell-actions>
    <ui-link-button
      [routerLink]="['/positions']"
      label="Back"
      variant="secondary"
      size="sm"
    />
  </div>

  <app-position-form
    [mode]="'create'"
    [form]="form"
    [isSubmitting]="isSubmitting()"
    [apiError]="apiError()"
    [fieldErrors]="fieldErrors()"
    (submitForm)="submit()"
    (cancel)="cancel()"
  />
</app-form-page-shell>

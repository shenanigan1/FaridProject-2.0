<section class="flex min-h-screen items-center justify-center bg-slate-100 p-4">
  <div class="w-full max-w-md rounded-lg bg-white p-6 shadow">
    <h1 class="mb-6 text-2xl font-semibold text-slate-900">Connexion</h1>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label for="email" class="mb-1 block text-sm font-medium text-slate-700">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="w-full rounded-md border border-slate-300 px-3 py-2 outline-none ring-indigo-200 focus:ring"
          placeholder="email@exemple.com"
        />
      </div>

      <div>
        <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Mot de passe</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full rounded-md border border-slate-300 px-3 py-2 outline-none ring-indigo-200 focus:ring"
          placeholder="Votre mot de passe"
        />
      </div>

      <button
        type="submit"
        class="w-full rounded-md bg-indigo-600 px-4 py-2 font-medium text-white transition hover:bg-indigo-700"
      >
        Se connecter
      </button>
    </form>

    <p *ngIf="error" class="mt-4 rounded-md bg-red-50 px-3 py-2 text-sm text-red-700">{{ error }}</p>
  </div>
</section>

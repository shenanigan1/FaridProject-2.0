<section class="h-screen overflow-hidden bg-[#05143a] px-6 py-8 text-slate-100">
  <div class="mx-auto flex h-full w-full max-w-[680px] flex-col justify-center">
    <header class="mb-7 text-center">
      <div class="inline-flex items-center gap-5">
        <div class="inline-flex h-[84px] w-[84px] items-center justify-center rounded-2xl bg-[#3b82f6] shadow-[0_10px_30px_rgba(59,130,246,0.35)]">
          <svg
            class="h-11 w-11 text-white"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.9"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="2.75" y="7" width="12.5" height="8.6" rx="0.8" />
            <path d="M15.25 10h3.1l2.9 3.1v2.5h-6" />
            <circle cx="8" cy="17.2" r="1.35" />
            <circle cx="18" cy="17.2" r="1.35" />
          </svg>
        </div>
        <h1 class="text-6xl font-black uppercase italic leading-none tracking-tight">
          <span class="text-slate-100">Fleet</span><span class="text-[#3b82f6]">Flow</span>
        </h1>
      </div>
      <p class="mt-3 text-[14px] font-semibold uppercase tracking-[0.38em] text-slate-400">
        Logistics & Recruitment Portal
      </p>
    </header>

    <article class="rounded-[32px] border border-slate-700/40 bg-[#1a2948] px-10 py-10 shadow-[0_24px_45px_rgba(0,0,0,0.42)]">
      @if (errorMessage()) {
        <div class="mb-4 rounded-xl border border-red-500/40 bg-red-500/10 px-4 py-2 text-sm text-red-200">
          {{ errorMessage() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-7">
        <div class="space-y-3">
          <label class="block text-[14px] font-bold uppercase tracking-[0.12em] text-slate-400" for="login-email">
            Email address
          </label>
          <div class="flex h-[76px] items-center gap-4 rounded-3xl border border-slate-700/60 bg-[#121f3b] px-6">
            <svg class="h-8 w-8 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M3 6.75h18v10.5H3z" />
              <path d="m4 8 8 6 8-6" />
            </svg>
            <input
              id="login-email"
              formControlName="email"
              type="email"
              placeholder="name@fleetflow.com"
              class="w-full bg-transparent text-[18px] text-slate-300 placeholder:text-slate-400/80 focus:outline-none"
            />
          </div>
        </div>

        <div class="space-y-3">
          <div class="flex items-center justify-between">
            <label class="text-[14px] font-bold uppercase tracking-[0.12em] text-slate-400" for="login-password">Password</label>
            <a routerLink="/support" class="text-[14px] font-bold uppercase tracking-[0.12em] text-[#3b82f6] hover:text-blue-300">
              Forgot password?
            </a>
          </div>
          <div class="flex h-[76px] items-center gap-4 rounded-3xl border border-slate-700/60 bg-[#121f3b] px-6">
            <svg class="h-8 w-8 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <rect x="4.5" y="10" width="15" height="10" rx="1.5" />
              <path d="M8 10V7.5a4 4 0 1 1 8 0V10" />
              <circle cx="12" cy="15" r="1" />
            </svg>
            <input
              id="login-password"
              formControlName="password"
              type="password"
              placeholder="••••••••"
              class="w-full bg-transparent text-[18px] tracking-[0.2em] text-slate-300 placeholder:text-slate-400/90 focus:outline-none"
            />
          </div>
        </div>

        <button
          type="submit"
          class="h-[78px] w-full rounded-3xl bg-[#3b82f6] text-[38px] font-bold uppercase tracking-[0.06em] text-slate-100 shadow-[0_0_24px_rgba(59,130,246,0.45)] transition hover:bg-blue-500 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="loading()"
        >
          {{ loading() ? 'Logging in…' : 'Log in ' }}
        </button>

        <label class="sr-only">
          <input type="checkbox" formControlName="rememberMe" />
        </label>
      </form>
    </article>

    <div class="mt-10 text-center text-[18px] text-slate-400">
      Don’t have an account?
      <a routerLink="/support" class="font-semibold text-slate-100 underline decoration-[#3b82f6] decoration-2 underline-offset-4">
        Request Access
      </a>
    </div>

    <div class="mt-8 border-t border-slate-700/40 pt-7 text-center">
      <p class="mx-auto inline-flex rounded-full border border-slate-700/50 px-8 py-2 font-mono text-[14px] tracking-[0.18em] text-slate-500 uppercase">
        V 0.0.0 "KINETIC" // SYSTEM_ACTIVE
      </p>
    </div>
  </div>
</section>

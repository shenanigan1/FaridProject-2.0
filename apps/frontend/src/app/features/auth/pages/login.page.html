<section class="h-screen overflow-hidden bg-slate-950 px-4 py-6 text-slate-100">
  <div class="mx-auto flex h-full w-full max-w-md items-center justify-center">
    <article class="w-full rounded-2xl border border-slate-800 bg-slate-900/90 p-6 shadow-2xl">
      <header class="mb-6 text-center">
        <div class="mb-4 inline-flex h-14 w-14 items-center justify-center rounded-xl border border-slate-700 bg-slate-800">
          <svg
            class="h-7 w-7 text-slate-100"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M3 7h11v8H3z" />
            <path d="M14 10h4l3 3v2h-7z" />
            <circle cx="7.5" cy="17.5" r="1.5" />
            <circle cx="17.5" cy="17.5" r="1.5" />
          </svg>
        </div>
        <h1 class="text-3xl font-semibold tracking-tight text-white">FleetFlow</h1>
        <p class="mt-1 text-sm text-slate-400">Logistics & Recruitment Portal</p>
      </header>

      @if (errorMessage()) {
        <div class="mb-4 rounded-md border border-red-500/40 bg-red-500/10 px-3 py-2 text-sm text-red-200">
          {{ errorMessage() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div class="space-y-2">
          <label class="block text-sm font-medium text-slate-200" for="login-email">Email</label>
          <input
            id="login-email"
            formControlName="email"
            type="email"
            placeholder="name@fleetflow.com"
            class="h-11 w-full rounded-md border border-slate-700 bg-slate-950 px-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-slate-400 focus:outline-none"
          />
        </div>

        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label class="block text-sm font-medium text-slate-200" for="login-password">Password</label>
            <a routerLink="/support" class="text-xs font-medium text-slate-300 hover:text-white">Forgot password?</a>
          </div>
          <input
            id="login-password"
            formControlName="password"
            type="password"
            placeholder="••••••••"
            class="h-11 w-full rounded-md border border-slate-700 bg-slate-950 px-3 text-sm text-slate-100 placeholder:text-slate-500 focus:border-slate-400 focus:outline-none"
          />
        </div>

        <label class="flex items-center gap-2 text-sm text-slate-300">
          <input type="checkbox" formControlName="rememberMe" class="h-4 w-4 rounded border-slate-600 bg-slate-800" />
          Remember me
        </label>

        <button
          type="submit"
          class="h-11 w-full rounded-md bg-white text-sm font-semibold text-slate-900 transition hover:bg-slate-200 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="loading()"
        >
          {{ loading() ? 'Signing in…' : 'Sign in' }}
        </button>
      </form>
    </article>
  </div>
</section>

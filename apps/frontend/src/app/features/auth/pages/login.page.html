<section class="h-screen overflow-hidden bg-[#05143a] px-4 text-slate-100 flex items-center justify-center">

  <!-- SCALE DESKTOP -->
  <div class="w-full max-w-[500px] flex flex-col items-center lg:scale-[0.8] lg:origin-center">

    <!-- HEADER -->
    <header class="mb-8 text-center">
      <div class="inline-flex items-center gap-3">
        <div class="inline-flex h-14 w-14 items-center justify-center rounded-xl bg-[#3b82f6] shadow-[0_10px_24px_rgba(59,130,246,0.35)]">
          <svg class="h-7 w-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
            <rect x="2.75" y="7" width="12.5" height="8.6" rx="0.8" />
            <path d="M15.25 10h3.1l2.9 3.1v2.5h-6" />
            <circle cx="8" cy="17.2" r="1.35" />
            <circle cx="18" cy="17.2" r="1.35" />
          </svg>
        </div>

        <h1 class="text-[40px] font-black uppercase italic tracking-[-0.04em]">
          <span>Fleet</span><span class="text-[#3b82f6]">Flow</span>
        </h1>
      </div>

      <p class="mt-3 text-[11px] font-semibold uppercase tracking-[0.3em] text-slate-400">
        Logistics & Recruitment Portal
      </p>
    </header>

    <!-- CARD -->
    <article class="w-full rounded-[26px] border border-slate-700/40 bg-[#1a2948] px-7 py-7 shadow-[0_20px_45px_rgba(0,0,0,0.42)]">

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">

        <!-- EMAIL -->
        <div class="space-y-2">
          <label for="email" class="text-[11px] font-bold uppercase tracking-[0.14em] text-slate-400">
            Email address
          </label>

          <div class="flex h-[54px] items-center gap-3 rounded-[16px] border border-slate-700/60 bg-[#121f3b] px-4">
            <svg class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M3 6.75h18v10.5H3z" />
              <path d="m4 8 8 6 8-6" />
            </svg>

            <input
              id="email"
              formControlName="email"
              type="email"
              placeholder="name@fleetflow.com"
              class="w-full bg-transparent text-[15px] text-slate-200 placeholder:text-slate-400/80 focus:outline-none"
            />
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="space-y-2">
          <div class="flex justify-between">
            <label for="password" class="text-[11px] font-bold uppercase tracking-[0.14em] text-slate-400">
              Password
            </label>
            <a class="text-[11px] font-bold uppercase text-[#3b82f6]">Forgot?</a>
          </div>

          <div class="flex h-[54px] items-center gap-3 rounded-[16px] border border-slate-700/60 bg-[#121f3b] px-4">
            <svg class="h-5 w-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="4.5" y="10" width="15" height="10" rx="1.5" />
              <path d="M8 10V7.5a4 4 0 1 1 8 0V10" />
              <circle cx="12" cy="15" r="1" />
            </svg>

            <input
              id="password"
              formControlName="password"
              type="password"
              placeholder="••••••••"
              class="w-full bg-transparent text-[15px] tracking-[0.16em] text-slate-200 focus:outline-none"
            />
          </div>
        </div>

        <!-- BUTTON -->
        <button
          type="submit"
          class="h-[56px] w-full rounded-[18px] bg-[#3b82f6] text-[18px] font-bold uppercase tracking-[0.05em] shadow-[0_0_18px_rgba(59,130,246,0.35)] hover:bg-blue-500 transition"
        >
          Log in
        </button>

      </form>
    </article>

    <!-- FOOTER -->
    <div class="mt-8 text-center text-[14px] text-slate-400">
      Don’t have an account?
      <a class="font-semibold text-white underline decoration-[#3b82f6]">Request Access</a>
    </div>

    <div class="mt-6 w-full border-t border-slate-700/40 pt-5 text-center">
      <p class="inline-flex rounded-full border border-slate-700/50 px-5 py-1.5 font-mono text-[10px] uppercase tracking-[0.14em] text-slate-500">
        V 0.0.0 "KINETIC"
      </p>
    </div>

  </div>
</section>

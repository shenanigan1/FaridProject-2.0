<ui-alert class="mt-5" variant="error" [message]="apiError"></ui-alert>

<ui-card class="mt-5">
  <form [formGroup]="form" (ngSubmit)="submitForm.emit()" class="space-y-4">
    <ui-text-input
      formControlName="name"
      label="Pool name"
      placeholder="e.g. Driving Core"
      [disabled]="isView"
    ></ui-text-input>

    <ui-textarea
      formControlName="description"
      label="Description (optional)"
      [rows]="4"
      placeholder="Short description of this pool…"
      [disabled]="isView"
    ></ui-textarea>

    <div class="flex items-center justify-between">
      <label class="text-xs font-medium text-slate-300">Code</label>

      <button
        *ngIf="!isView"
        type="button"
        class="text-xs font-semibold text-sky-300 hover:text-sky-200"
        (click)="normalize.emit()"
      >
        Normalize
      </button>
    </div>

    <ui-text-input
      formControlName="code"
      label=""
      placeholder="DRIVING_CORE"
      [disabled]="isView"
      (blur)="!isView && normalize.emit()"
    ></ui-text-input>

    <p *ngIf="showNormalizeHint" class="text-xs text-slate-400">
      Use uppercase letters, numbers, underscore. Example:
      <span class="font-mono text-slate-200">SAFETY_RULES</span>
    </p>

    <!-- Actions -->
    <ng-container *ngIf="mode === 'create'">
      <ui-button-primary type="submit" variant="primary" [loading]="isLoading" block>
        Create pool
      </ui-button-primary>

      <ui-button-primary type="button" variant="secondary" (click)="cancel.emit()" block>
        Cancel
      </ui-button-primary>
    </ng-container>

    <ng-container *ngIf="mode === 'edit'">
      <ui-button-primary type="submit" variant="primary" [loading]="isLoading" block>
        Save
      </ui-button-primary>

      <ui-button-primary type="button" variant="secondary" (click)="cancel.emit()" block>
        Cancel
      </ui-button-primary>
    </ng-container>

    <!-- view: pas d’actions dans le form (tu les mets en header) -->
  </form>
</ui-card>

<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto w-full max-w-sm px-4 pt-6 pb-10">
    <div class="flex items-center gap-3">
      <ui-icon-button ariaLabel="Back" (click)="back()">
        <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-current" stroke-width="2">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </ui-icon-button>

      <div>
        <h1 class="text-lg font-semibold">Create Pool</h1>
        <p class="mt-1 text-xs text-slate-400">Create a reusable question pool.</p>
      </div>
    </div>

    <ui-alert class="mt-5" variant="error" [message]="error()"></ui-alert>

    <ui-card class="mt-5">
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <ui-text-input
          formControlName="name"
          label="Pool name"
          placeholder="e.g. Driving Core">
        </ui-text-input>

        <ui-textarea
          formControlName="description"
          label="Description (optional)"
          [rows]="4"
          placeholder="Short description of this pool…">
        </ui-textarea>

        <div class="flex items-center justify-between">
          <label class="text-xs font-medium text-slate-300">Code</label>
          <button type="button" class="text-xs font-semibold text-sky-300 hover:text-sky-200" (click)="normalizeCode()">
            Normalize
          </button>
        </div>

        <ui-text-input
          formControlName="code"
          label=""
          placeholder="DRIVING_CORE"
          (blur)="normalizeCode()">
        </ui-text-input>

        <p class="text-xs text-slate-400">
          Use uppercase letters, numbers, underscore. Example:
          <span class="font-mono text-slate-200">SAFETY_RULES</span>
        </p>

        <ui-button-primary type="submit" variant="primary" [loading]="isLoading()" block>
          Create pool
        </ui-button-primary>

        <ui-button-primary type="button" variant="secondary" (click)="back()" block>
          Cancel
        </ui-button-primary>
      </form>
    </ui-card>
  </div>
</div>

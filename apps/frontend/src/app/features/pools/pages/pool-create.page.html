<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto w-full max-w-sm px-4 pt-6 pb-10">
    <!-- Top -->
    <div class="flex items-center gap-3">
      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-slate-900/60 ring-1 ring-white/10 hover:bg-slate-900"
        (click)="back()"
        aria-label="Back"
      >
        <svg viewBox="0 0 24 24" class="h-5 w-5 fill-none stroke-slate-200" stroke-width="2">
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>

      <div>
        <h1 class="text-lg font-semibold">Create Pool</h1>
        <p class="mt-1 text-xs text-slate-400">Create a reusable question pool.</p>
      </div>
    </div>

    <!-- Error -->
    <div
      *ngIf="error()"
      class="mt-5 rounded-2xl bg-red-500/10 p-4 ring-1 ring-red-500/30"
    >
      <p class="text-sm text-red-200">{{ error() }}</p>
    </div>

    <!-- Form card -->
    <form
      class="mt-5 space-y-4 rounded-2xl bg-slate-900/60 p-4 ring-1 ring-white/10"
      [formGroup]="form"
      (ngSubmit)="submit()"
    >
      <!-- Name -->
      <div>
        <label class="text-xs font-medium text-slate-300">Pool name</label>
        <input
          type="text"
          formControlName="name"
          class="mt-2 w-full rounded-2xl bg-slate-950/40 px-4 py-3 text-sm text-slate-100 ring-1 ring-white/10 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40"
          placeholder="e.g. Driving Core"
        />
        <p *ngIf="form.controls.name.touched && form.controls.name.invalid" class="mt-2 text-xs text-red-300">
          Name is required (min 2 chars).
        </p>
      </div>
      <!-- Description -->
      <div>
        <label class="text-xs font-medium text-slate-300">Description (optional)</label>

        <textarea
          formControlName="description"
          rows="4"
          class="mt-2 w-full resize-none rounded-2xl bg-slate-950/40 px-4 py-3 text-sm text-slate-100 ring-1 ring-white/10 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40"
          placeholder="Short description of this pool…"
          ></textarea>

        <p *ngIf="form.controls.description.touched && form.controls.description.invalid"
          class="mt-2 text-xs text-red-300">
          Description is too long (max 500 chars).
        </p>
      </div>

      <!-- Code -->
      <div>
        <div class="flex items-center justify-between">
          <label class="text-xs font-medium text-slate-300">Code</label>
          <button
            type="button"
            class="text-xs font-semibold text-sky-300 hover:text-sky-200"
            (click)="normalizeCode()"
          >
            Normalize
          </button>
        </div>

        <input
          type="text"
          formControlName="code"
          class="mt-2 w-full rounded-2xl bg-slate-950/40 px-4 py-3 text-sm text-slate-100 ring-1 ring-white/10 placeholder:text-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500/40"
          placeholder="DRIVING_CORE"
          (blur)="normalizeCode()"
        />

        <p class="mt-2 text-xs text-slate-400">
          Use uppercase letters, numbers, underscore. Example: <span class="font-mono text-slate-200">SAFETY_RULES</span>
        </p>

        <p *ngIf="form.controls.code.touched && form.controls.code.invalid" class="mt-2 text-xs text-red-300">
          Code is required and must match: A-Z, 0-9, underscore.
        </p>
      </div>

      <!-- Actions -->
      <div class="pt-2">
        <button
          type="submit"
          [disabled]="isLoading()"
          class="inline-flex w-full items-center justify-center rounded-2xl bg-sky-600 px-4 py-3 text-sm font-semibold text-white hover:bg-sky-500 disabled:cursor-not-allowed disabled:opacity-60"
        >
          <span *ngIf="!isLoading()">Create pool</span>
          <span *ngIf="isLoading()">Creating…</span>
        </button>

        <button
          type="button"
          class="mt-3 inline-flex w-full items-center justify-center rounded-2xl bg-slate-900/60 px-4 py-3 text-sm font-semibold text-slate-200 ring-1 ring-white/10 hover:bg-slate-900"
          (click)="back()"
        >
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>

<section class="ff-candidate-shell">
  <header class="ff-candidate-topbar">
    <div class="ff-brand-lockup">
      <div class="ff-brand-mark" aria-hidden="true">FF</div>

      <div class="ff-u-min-0">
        <p class="ff-brand-title">{{ appTitle }}</p>
        <p class="ff-brand-subtitle">Candidate portal</p>
      </div>
    </div>

    <button
      type="button"
      class="ff-profile-trigger"
      data-testid="profile-button"
      (click)="onProfileClicked()"
    >
      <span class="ff-avatar">{{ profileInitials }}</span>
      <span class="ff-u-min-0">{{ profileFullName }}</span>
    </button>
  </header>

  <main class="ff-candidate-main">
    @if (sessionExpiredMessage) {
      <div class="ff-app-container ff-app-container--compact ff-u-mt-md">
        <p class="ff-alert ff-alert-error" role="alert">
          {{ sessionExpiredMessage }}
        </p>
      </div>
    }

    <router-outlet />
  </main>

  <nav class="ff-candidate-nav" aria-label="Navigation candidat">
    @for (item of navItems; track item.route) {
      <a
        class="ff-candidate-nav__item"
        data-testid="candidate-nav-link"
        [routerLink]="item.route"
        routerLinkActive="active"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  @if (authModalOpen) {
    <app-auth-modal
      (authenticated)="onAuthSuccess()"
      (closed)="authModalOpen = false"
    />
  }
</section>

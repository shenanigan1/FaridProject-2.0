<div class="phone-shell">
  <header class="top-bar">
    <div class="brand">
      <span class="logo">🚛</span>
      <div>
        <h1>Fleet Candidates</h1>
        <p>Candidate Portal</p>
      </div>
    </div>

    <div class="profile-menu" (click)="stopPropagation($event)">
      <button type="button" class="profile-trigger" (click)="toggleProfileMenu()">☰</button>

      @if (profileMenuOpen()) {
        <div class="menu-dropdown">
          @if (isAuthenticated()) {
            <p class="menu-user">{{ currentUser()!.firstName }} {{ currentUser()!.lastName }}</p>
            <a routerLink="/account">Gérer mon compte</a>
            <button type="button" (click)="logout()">Se déconnecter</button>
          } @else {
            <p class="menu-user">Non connecté</p>
            <a routerLink="/account">Se connecter / Créer un compte</a>
          }
        </div>
      }
    </div>
  </header>

  <main class="page-wrapper">
    <router-outlet />
  </main>

  <nav class="bottom-nav">
    <a routerLink="/offers" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">🏷 Offres</a>
    <a routerLink="/applications" routerLinkActive="active">🧾 Candidatures</a>
    <a routerLink="/account" routerLinkActive="active">👤 Compte</a>
  </nav>
</div>

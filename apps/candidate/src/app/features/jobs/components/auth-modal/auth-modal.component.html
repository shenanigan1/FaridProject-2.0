<app-modal title="Connexion / inscription" (close)="close.emit()">
  <div class="mb-4 flex gap-2 rounded-xl bg-slate-800 p-1">
    <button
      type="button"
      (click)="switchMode('login')"
      [class]="mode() === 'login' ? 'flex-1 rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold' : 'flex-1 rounded-lg px-3 py-2 text-sm text-slate-300'"
    >
      Login
    </button>
    <button
      type="button"
      (click)="switchMode('signup')"
      [class]="mode() === 'signup' ? 'flex-1 rounded-lg bg-blue-600 px-3 py-2 text-sm font-semibold' : 'flex-1 rounded-lg px-3 py-2 text-sm text-slate-300'"
    >
      Sign up
    </button>
  </div>

  <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
    @if (mode() === 'signup') {
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="text-sm text-slate-300">
          First name
          <input class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" formControlName="firstName" />
        </label>
        <label class="text-sm text-slate-300">
          Last name
          <input class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" formControlName="lastName" />
        </label>
      </div>

      <label class="block text-sm text-slate-300">
        Phone
        <input class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" formControlName="phone" />
      </label>
    }

    <label class="block text-sm text-slate-300">
      Email
      <input class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" formControlName="email" />
    </label>

    <label class="block text-sm text-slate-300">
      Password
      <input type="password" class="mt-1 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" formControlName="password" />
    </label>

    <button type="submit" class="w-full rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold transition hover:bg-blue-500">
      {{ mode() === 'login' ? 'Se connecter' : "Créer un compte" }}
    </button>
  </form>
</app-modal>

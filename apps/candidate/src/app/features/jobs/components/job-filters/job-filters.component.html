<form [formGroup]="form" (ngSubmit)="submit()" class="ff-toolbar-panel">
  <label class="ff-search-box" for="search">
    <svg aria-hidden="true" viewBox="0 0 24 24">
      <path
        fill="currentColor"
        d="m21 19.6-5.3-5.3a7.4 7.4 0 1 0-1.4 1.4L19.6 21 21 19.6ZM4 10a6 6 0 1 1 12 0 6 6 0 0 1-12 0Z"
      />
    </svg>
    <input
      id="search"
      type="text"
      formControlName="search"
      placeholder="Rechercher un poste ou une ville..."
    />
  </label>

  <section class="ff-form-grid ff-form-grid--two" aria-label="Filtres offres">
    <label class="ff-field-block">
      <span>Location</span>
      <select formControlName="location" class="ff-control">
        <option value="">Toutes les villes</option>
        <option value="chicago">Chicago</option>
        <option value="dallas">Dallas</option>
        <option value="phoenix">Phoenix</option>
      </select>
    </label>

    <label class="ff-field-block">
      <span>Type</span>
      <select formControlName="employmentType" class="ff-control">
        <option value="">Tous les contrats</option>
        <option value="full-time">Full-time</option>
        <option value="part-time">Part-time</option>
        <option value="contract">Contract</option>
      </select>
    </label>

    <label class="ff-field-block">
      <span>Priorite</span>
      <select formControlName="priority" class="ff-control">
        <option value="">Toutes les priorites</option>
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </label>
  </section>

  <footer class="ff-inline-actions ff-u-end">
    <button type="button" (click)="reset()" class="ff-btn ff-btn-secondary">
      Reset
    </button>

    <button type="submit" class="ff-btn ff-btn-primary">
      Search
    </button>
  </footer>
</form>

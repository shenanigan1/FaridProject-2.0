<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  class="rounded-2xl border border-slate-800 bg-slate-900 p-4 shadow-lg shadow-black/20"
>
  <div class="flex flex-col gap-3 lg:flex-row lg:items-center">
    <div class="flex-1">
      <label for="search" class="sr-only">Search jobs</label>
      <input
        id="search"
        type="text"
        formControlName="search"
        placeholder="Search job titles or keywords"
        class="w-full rounded-xl border border-slate-800 bg-slate-950 px-4 py-3 text-sm text-white placeholder:text-slate-500 focus:border-blue-500 focus:outline-none"
      />
    </div>

    <div class="grid grid-cols-1 gap-3 sm:grid-cols-3 lg:w-auto">
      <select
        formControlName="location"
        class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-3 text-sm text-slate-200 focus:border-blue-500 focus:outline-none"
      >
        <option value="">Location</option>
        <option value="chicago">Chicago</option>
        <option value="dallas">Dallas</option>
        <option value="phoenix">Phoenix</option>
      </select>

      <select
        formControlName="employmentType"
        class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-3 text-sm text-slate-200 focus:border-blue-500 focus:outline-none"
      >
        <option value="">Job type</option>
        <option value="full-time">Full-time</option>
        <option value="part-time">Part-time</option>
        <option value="contract">Contract</option>
      </select>

      <select
        formControlName="priority"
        class="rounded-xl border border-slate-800 bg-slate-950 px-4 py-3 text-sm text-slate-200 focus:border-blue-500 focus:outline-none"
      >
        <option value="">Priority</option>
        <option value="urgent">Urgent</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>

    <div class="flex gap-3 lg:ml-auto">
      <button
        type="button"
        (click)="reset()"
        class="rounded-xl border border-slate-700 px-4 py-3 text-sm font-medium text-slate-300 transition hover:border-slate-600 hover:text-white"
      >
        Reset
      </button>

      <button
        type="submit"
        class="rounded-xl bg-blue-600 px-4 py-3 text-sm font-semibold text-white transition hover:bg-blue-500"
      >
        Search
      </button>
    </div>
  </div>
</form>

<article class="rounded-2xl border border-slate-800 bg-slate-900 p-5 shadow-lg shadow-black/20">
  <div class="flex items-start justify-between gap-4">
    <div class="min-w-0">
      <h2 data-testid="job-title" class="truncate text-lg font-semibold text-white">
        {{ job.title }}
      </h2>

      <div data-testid="job-location" class="mt-2 flex flex-wrap items-center gap-2 text-sm text-slate-300">
        <span>{{ job.location }}</span>
        <span class="text-slate-500">•</span>
        <span data-testid="job-contractType" >{{ job.contractType }}</span>
        <span class="text-slate-500">•</span>
        <span data-testid="job-department">{{ job.department }}</span>
      </div>
    </div>

    <a
      [routerLink]="['/jobs', job.id]"
      class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-500"
    >
      View details
    </a>
  </div>

  <p  data-testid="job-description" class="mt-4 line-clamp-2 text-sm leading-6 text-slate-400">
    {{ job.description }}
  </p>

  <div data-testid="job-salary" class="mt-5 flex items-end justify-between gap-4 text-sm text-slate-400">
    <div>
      Salary:
      <span class="text-slate-200">{{ job.salary | currency }}</span>
    </div>

    <div>
      Posted:
      <span data-testid="job-createdAt" class="text-slate-200">{{ job.createdAt | date: 'MMM d, y' }}</span>
    </div>
  </div>
</article>

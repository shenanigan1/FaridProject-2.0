<article class="ff-data-card">
  <header class="ff-card-head">
    <div class="ff-u-min-0">
      <h2 data-testid="job-title" class="ff-row-title ff-row-title--lg">
        {{ job.title }}
      </h2>

      <p data-testid="job-location" class="ff-row-meta">
        <span>{{ job.location }}</span>
        <span aria-hidden="true"> - </span>
        <span data-testid="job-contractType">{{ job.contractType }}</span>
        <span aria-hidden="true"> - </span>
        <span data-testid="job-department">{{ job.department }}</span>
      </p>
    </div>

    <a [routerLink]="['/jobs', job.id]" class="ff-btn ff-btn-primary">
      Voir details
    </a>
  </header>

  <p data-testid="job-description" class="ff-row-meta ff-u-mt-md">
    {{ job.description }}
  </p>

  <footer data-testid="job-salary" class="ff-card-foot">
    <p class="ff-row-meta">
      Salaire:
      <span class="ff-detail-value">{{ job.salary | currency }}</span>
    </p>

    <p class="ff-row-meta">
      Publie:
      <span data-testid="job-createdAt" class="ff-detail-value">
        {{ job.createdAt | date: 'MMM d, y' }}
      </span>
    </p>
  </footer>
</article>

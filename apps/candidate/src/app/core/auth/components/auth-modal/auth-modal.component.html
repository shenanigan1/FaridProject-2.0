<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
  <button
    type="button"
    class="absolute inset-0 bg-black/70"
    data-testid="candidate-auth-backdrop"
    aria-label="Close authentication dialog"
    (click)="onClose()"
  ></button>

  <div
    #dialogPanel
    class="relative w-full max-w-md"
    role="dialog"
    aria-modal="true"
    aria-labelledby="candidate-auth-title"
    tabindex="-1"
  >
    <app-auth-card
      [title]="mode === 'signin' ? 'Sign in' : 'Create account'"
      subtitle="Access your candidate space"
    >
      <h2 id="candidate-auth-title" class="sr-only">
        {{ mode === 'signin' ? 'Sign in' : 'Create account' }}
      </h2>

      @if (errorMessage) {
        <app-ui-alert [message]="errorMessage" variant="error" />
      }

      <form class="space-y-4" [formGroup]="authForm" (ngSubmit)="onSubmit()">
        @if (mode === 'signup') {
          <app-ui-text-input
          formControlName="firstName"
          inputId="candidate-first-name"
          label="First name"
          placeholder="John"
          [error]="getFieldError('firstName')"
          />

          <app-ui-text-input
          formControlName="lastName"
          inputId="candidate-last-name"
          label="Last name"
          placeholder="Doe"
          [error]="getFieldError('lastName')"
          />

          <app-ui-text-input
          formControlName="phone"
          inputId="candidate-phone"
          label="Phone"
          placeholder="+33..."
            type="tel"
            [error]="getFieldError('phone')"
          />
        }

        <app-ui-text-input
          formControlName="email"
          inputId="candidate-email"
          label="Email"
          placeholder="candidate@example.com"
          type="email"
          [error]="getFieldError('email')"
        />

        <app-ui-text-input
          formControlName="password"
          inputId="candidate-password"
          label="Password"
          placeholder="••••••••"
          type="password"
          [error]="getFieldError('password')"
        />

        <app-ui-button-primary
          type="submit"
          [loading]="isSubmitting"
          [label]="mode === 'signin' ? 'Sign in' : 'Create account'"
        />
      </form>

      <div class="mt-3 flex items-center justify-between text-sm">
        <button class="text-slate-400 hover:text-slate-200" type="button" (click)="switchMode()">
          {{ mode === 'signin' ? 'No account? Sign up' : 'Already have an account? Sign in' }}
        </button>

        <button class="text-slate-500 hover:text-slate-300" type="button" (click)="onClose()">
          Close
        </button>
      </div>
    </app-auth-card>
  </div>
</div>

<style>
        body {
            background-color: #10131a;
            color: #e0e2ec;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">
<!-- Login Container -->
<main class="w-full max-w-[420px] flex flex-col items-center px-lg">
<!-- Branding Section -->
<div class="mb-xl flex flex-col items-center text-center">
<div class="mb-md">
<img alt="FleetFlow Logo" class="w-[64px] h-[64px] object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ugdSn9LmIor5SBe-HXltobJhmC2YpOB93tIrPCsgZeEDQnMQo9Oor1kAcY67Hc3KvYoh5Zobec7cTujhJSDRpQMhuyirdbLtVWPV-akYIfJPg5n-Ot-SgCU8VuDlt21dYf7ZzwUdvkvbBODJcwUunTWe0pYIonep_xuzBrVBvAeqFyI6DNSzVYBwNrTB2D5T2zPm2lbegIdXwn9hKDSl_wsweZ6r9aCNueL-Pe_pVGf_GMLCE5Gwg2o79IB"/>
</div>
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs tracking-tight">FleetFlow</h1>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Logistics &amp; Recruitment Portal</p>
</div>
<!-- Authentication Card -->
<div class="w-full bg-surface-container border border-outline-variant p-lg rounded-sm">
<form action="#" class="space-y-lg" method="POST">
<!-- Email Field -->
<div class="space-y-sm">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">alternate_email</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md rounded-sm py-md pl-[44px] pr-md focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-outline" id="email" name="email" placeholder="name@fleetflow.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-sm">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border border-outline-variant text-on-surface font-body-md text-body-md rounded-sm py-md pl-[44px] pr-md focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant bg-surface-container-lowest text-primary-container focus:ring-primary-container" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-sm font-label-md text-label-md text-on-surface-variant" for="remember-me">Remember me</label>
</div>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md py-md px-lg rounded-sm hover:opacity-90 active:scale-[0.98] transition-all flex justify-center items-center gap-sm uppercase tracking-wider font-bold" type="submit">
                    Log in
                    <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'wght' 700">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Actions -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary hover:underline font-bold transition-all ml-xs" href="#">Request access</a>
</p>
</div>
</main>
<!-- System Version Footer -->
<footer class="fixed bottom-lg w-full px-xl flex justify-between items-center opacity-40">
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-[16px]">sensors</span>
<span class="font-code-sm text-code-sm text-on-surface-variant uppercase tracking-tighter">V 2.4.0 KINETIC // SYSTEM_ACTIVE</span>
</div>
<div class="flex gap-lg">
<span class="font-code-sm text-code-sm text-on-surface-variant uppercase">Encrypted Session</span>
<span class="font-code-sm text-code-sm text-on-surface-variant uppercase">© 2024 FF_LOGISTICS</span>
</div>
</footer>
</body></html>
